name: Deploy to Netlify

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Netlify
        run: |
          cp Hostels1_Dashboard.html index.html
          zip deploy.zip index.html
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys")
          echo "$RESPONSE" | python3 -c "
import sys, json
d = json.load(sys.stdin)
print('Deploy ID:', d.get('id', d.get('deploy_id', 'unknown')))
print('State:', d.get('state', 'unknown'))
if 'error_message' in d:
    print('Error:', d['error_message'])
    sys.exit(1)
"
